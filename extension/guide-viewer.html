<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassLoop Guide Link</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: #f4f4f5;
        color: #18181b;
        display: grid;
        place-items: center;
        padding: 18px;
      }
      .card {
        width: min(720px, 96vw);
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        color: #e67e22;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0 0 8px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 650;
      }
      p {
        margin: 0 0 12px;
        color: #52525b;
        line-height: 1.55;
        font-size: 14px;
      }
      .meta {
        font-size: 12px;
        color: #71717a;
        margin-bottom: 14px;
        word-break: break-word;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        border: 1px solid #e4e4e7;
        background: #fff;
        color: #18181b;
        border-radius: 9px;
        padding: 10px 12px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: #18181b;
        border-color: #18181b;
        color: #fff;
      }
      .status {
        min-height: 18px;
        color: #71717a;
        font-size: 12px;
      }
      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <p class="eyebrow">Shared interactive guide</p>
      <h1 id="guideTitle">Guide</h1>
      <p id="guideDesc">Preparing launch…</p>
      <div class="meta" id="guideMeta"></div>
      <div class="actions">
        <button id="btnOpenNow" class="primary" type="button">Open source and start guide</button>
        <button id="btnCopyLaunchUrl" type="button">Copy launch URL</button>
      </div>
      <p class="status" id="status"></p>
    </article>
    <script src="guide-viewer.js"></script>
  </body>
</html>
